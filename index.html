<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMPRA DO MÊS v2.0.5</title>
    <style>
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        .controles, .historico-container { 
            background: #fff; width: 100%; max-width: 500px; padding: 20px; border: 1px solid #ccc; 
            margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; border-bottom: 5px dashed #ccc; 
        }
        
        .input-group { display: flex; gap: 8px; }
        input, select { background: transparent; border: 1px solid #000; padding: 12px; font-size: 16px; font-weight: bold; outline: none; width: 100%; }
        
        .btn-add { background: #000; color: #fff; border: none; padding: 15px; cursor: pointer; font-weight: bold; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }
        
        .recibo { background-color: #fff; width: 100%; max-width: 500px; padding: 25px; border: 1px solid #ccc; box-shadow: 0 0 15px rgba(0,0,0,0.2); min-height: 400px; margin-bottom: 20px; }
        
        .header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 15px; margin-bottom: 15px; }
        
        .categoria-bloco { margin-top: 20px; }
        .categoria-titulo { background: #000; color: #fff; padding: 5px 10px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }

        .item-linha { border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
        .item-linha.comprado { color: #aaa; }
        .item-linha.comprado .texto-item { text-decoration: line-through; }
        
        .btn-acao { min-width: 40px; min-height: 40px; border: 1px solid #000; background: #fff; cursor: pointer; font-weight: bold; }
        
        .totais { margin-top: 30px; border-top: 2px dashed #000; padding-top: 15px; font-weight: bold; font-size: 1.4rem; display: flex; justify-content: space-between; }

        .historico-titulo { text-align: center; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 10px; }
        .mes-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 5px; background: #f9f9f9; display: flex; justify-content: space-between; }

        @media print { .controles, .btn-acao, .historico-container { display: none !important; } }
    </style>
</head>
<body>

    <div class="controles">
        <div class="input-group">
            <input type="number" id="qtd" style="width: 25%" value="1" inputmode="numeric">
            <input type="text" id="desc" style="width: 75%" placeholder="NOME DO ITEM">
        </div>
        <div class="input-group">
            <input type="number" id="valor" style="width: 45%" placeholder="R$ PREÇO" step="0.01" inputmode="decimal">
            <select id="categoria" style="width: 55%">
                <option value="GERAL">CATEGORIA</option>
                <option value="AÇOUGUE">AÇOUGUE</option>
                <option value="LIMPEZA">LIMPEZA</option>
                <option value="HORTIFRUTI">HORTIFRUTI</option>
                <option value="PADARIA">PADARIA</option>
                <option value="BEBIDAS">BEBIDAS</option>
            </select>
        </div>
        <button class="btn-add" onclick="adicionarItem()">INSERIR NA NOTA</button>
    </div>

    <div class="recibo">
        <div class="header">
            <h2 style="margin: 0; letter-spacing: 2px;">COMPRA DO MÊS</h2>
            <small id="data-exibicao"></small>
        </div>
        <div id="corpo-recibo"></div>
        <div class="totais">
            <span>TOTAL:</span>
            <span id="valor-total-geral">R$ 0,00</span>
        </div>
    </div>

    <div class="historico-container">
        <div class="historico-titulo">HISTÓRICO MENSAL</div>
        <div id="lista-historico"></div>
        <button class="btn-add" style="background: #555; margin-top: 10px;" onclick="fecharMes()">FECHAR MÊS / LIMPAR ATUAL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Substitua pelas suas chaves reais do Firebase
        const firebaseConfig = {
            apiKey: "COLE_AQUI_SUA_API_KEY",
            authDomain: "lista-de-compras-8474e.firebaseapp.com",
            databaseURL: "https://lista-de-compras-8474e-default-rtdb.firebaseio.com",
            projectId: "lista-de-compras-8474e",
            storageBucket: "lista-de-compras-8474e.appspot.com",
            messagingSenderId: "812165275822",
            appId: "COLE_AQUI_O_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const listaRef = ref(db, 'compras');
        const histRef = ref(db, 'historico_mensal');

        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const dataAtual = new Date();
        const mesAno = `${meses[dataAtual.getMonth()]}-${dataAtual.getFullYear()}`;

        document.getElementById('data-exibicao').innerText = dataAtual.toLocaleDateString('pt-BR');

        window.adicionarItem = function() {
            const d = document.getElementById('desc').value;
            const q = document.getElementById('qtd').value;
            const v = document.getElementById('valor').value;
            const c = document.getElementById('categoria').value;

            if (!d) return alert("Digite o nome do item!");

            push(listaRef, {
                desc: d.toUpperCase(),
                qtd: parseFloat(q) || 1,
                valor: parseFloat(v) || 0,
                cat: c,
                comprado: false
            });

            document.getElementById('desc').value = "";
            document.getElementById('valor').value = "";
            document.getElementById('desc').focus();
        };

        onValue(listaRef, (snapshot) => {
            const corpo = document.getElementById('corpo-recibo');
            corpo.innerHTML = "";
            let totalGeral = 0;
            let itensPorCategoria = {};

            snapshot.forEach((childSnapshot) => {
                const item = childSnapshot.val();
                item.key = childSnapshot.key;
                if (!itensPorCategoria[item.cat]) itensPorCategoria[item.cat] = [];
                itensPorCategoria[item.cat].push(item);
            });

            for (let cat in itensPorCategoria) {
                const bloco = document.createElement('div');
                bloco.className = 'categoria-bloco';
                bloco.innerHTML = `<div class="categoria-titulo">${cat}</div>`;
                itensPorCategoria[cat].forEach(item => {
                    const sub = item.qtd * item.valor;
                    totalGeral += sub;
                    const div = document.createElement('div');
                    div.className = `item-linha ${item.comprado ? 'comprado' : ''}`;
                    div.innerHTML = `
                        <div class="texto-item"><strong>${item.qtd}x ${item.desc}</strong><br><small>R$ ${sub.toFixed(2)}</small></div>
                        <div style="display:flex; gap:5px;">
                            <button class="btn-acao" onclick="toggleItem('${item.key}', ${item.comprado})">✓</button>
                            <button class="btn-acao" onclick="removerItem('${item.key}')" style="color:red">X</button>
                        </div>`;
                    bloco.appendChild(div);
                });
                corpo.appendChild(bloco);
            }
            document.getElementById('valor-total-geral').innerText = "R$ " + totalGeral.toFixed(2).replace('.', ',');
            update(ref(db, 'historico_mensal/' + mesAno), { total: totalGeral });
        });

        onValue(histRef, (snapshot) => {
            const histDiv = document.getElementById('lista-historico');
            histDiv.innerHTML = "";
            snapshot.forEach((child) => {
                const mesData = child.val();
                const div = document.createElement('div');
                div.className = 'mes-card';
                div.innerHTML = `<span>${child.key.replace('-', '/')}</span> <strong>R$ ${mesData.total.toFixed(2)}</strong>`;
                histDiv.appendChild(div);
            });
        });

        window.toggleItem = (key, status) => update(ref(db, 'compras/' + key), { comprado: !status });
        window.removerItem = (key) => confirm("Apagar item?") && remove(ref(db, 'compras/' + key));
        
        window.fecharMes = () => {
            if(confirm("Deseja limpar a lista atual? O total acumulado permanecerá no histórico mensal.")) {
                remove(listaRef);
            }
        };

    </script>
</body>
</html>
