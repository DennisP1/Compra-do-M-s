<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pegas - Lista de Compras</title>
    <style>
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body { 
            background-color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px; 
            margin: 0; 
        }

        .controles { 
            background: #fff; 
            width: 100%; 
            max-width: 500px; 
            padding: 20px; 
            border: 1px solid #ccc; 
            margin-bottom: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            border-bottom: 5px dashed #ccc; 
        }

        .input-group { display: flex; gap: 8px; }

        input { 
            background: transparent; 
            border: 1px solid #000; 
            padding: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            outline: none; 
            width: 100%; 
        }

        .btn-add { 
            background: #000; 
            color: #fff; 
            border: none; 
            padding: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        .recibo { 
            background-color: #fff; 
            width: 100%; 
            max-width: 500px; 
            padding: 25px; 
            border: 1px solid #ccc; 
            box-shadow: 0 0 15px rgba(0,0,0,0.2); 
            min-height: 400px; 
        }

        .header { 
            text-align: center; 
            border-bottom: 2px dashed #000; 
            padding-bottom: 15px; 
            margin-bottom: 15px; 
        }

        .item-linha { 
            border-bottom: 1px solid #eee; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 0; 
        }

        .item-linha.comprado { 
            color: #aaa; 
        }

        .item-linha.comprado .texto-item {
            text-decoration: line-through;
        }

        .botoes-item {
            display: flex;
            gap: 5px;
        }

        .btn-acao { 
            min-width: 40px; 
            min-height: 40px; 
            border: 1px solid #000; 
            background: #fff; 
            cursor: pointer; 
            font-weight: bold;
        }

        .totais { 
            margin-top: 30px; 
            border-top: 2px dashed #000; 
            padding-top: 15px; 
            font-weight: bold; 
            font-size: 1.4rem; 
            display: flex; 
            justify-content: space-between; 
        }

        @media print { 
            .controles, .botoes-item { display: none !important; } 
            body { background: #fff; }
            .recibo { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <div class="controles">
        <div class="input-group">
            <input type="number" id="qtd" style="width: 25%" value="1" inputmode="numeric">
            <input type="text" id="desc" style="width: 75%" placeholder="NOME DO ITEM">
        </div>
        <div class="input-group">
            <input type="number" id="valor" placeholder="R$ PREÇO UN." step="0.01" inputmode="decimal">
        </div>
        <button class="btn-add" onclick="adicionarItem()">INSERIR NA NOTA</button>
    </div>

    <div class="recibo">
        <div class="header">
            <h2 style="margin: 0; letter-spacing: 2px;">PEGAS - MARKET</h2>
            <small id="data-exibicao"></small>
        </div>
        <div id="lista-itens"></div>
        <div class="totais">
            <span>TOTAL:</span>
            <span id="valor-total-geral">R$ 0,00</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAÇÃO FIREBASE (Preencha a apiKey e o appId)
        const firebaseConfig = {
            apiKey: "COLE_SUA_API_KEY_AQUI", 
            authDomain: "lista-de-compras-8474e.firebaseapp.com",
            databaseURL: "https://lista-de-compras-8474e-default-rtdb.firebaseio.com",
            projectId: "lista-de-compras-8474e",
            storageBucket: "lista-de-compras-8474e.appspot.com",
            messagingSenderId: "812165275822",
            appId: "COLE_SEU_APP_ID_AQUI"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const listaRef = ref(db, 'compras');

        document.getElementById('data-exibicao').innerText = new Date().toLocaleDateString('pt-BR');

        // Adicionar item ao banco
        window.adicionarItem = function() {
            const d = document.getElementById('desc').value;
            const q = document.getElementById('qtd').value;
            const v = document.getElementById('valor').value;

            if (!d) return alert("Por favor, digite o nome do item.");

            push(listaRef, {
                desc: d.toUpperCase(),
                qtd: parseFloat(q) || 1,
                valor: parseFloat(v) || 0,
                comprado: false
            });

            document.getElementById('desc').value = "";
            document.getElementById('valor').value = "";
            document.getElementById('desc').focus();
        };

        // Escutar mudanças no banco e atualizar a tela
        onValue(listaRef, (snapshot) => {
            const listaDiv = document.getElementById('lista-itens');
            listaDiv.innerHTML = "";
            let totalGeral = 0;
            
            snapshot.forEach((childSnapshot) => {
                const item = childSnapshot.val();
                const key = childSnapshot.key;
                const subtotal = item.qtd * item.valor;
                totalGeral += subtotal;

                const div = document.createElement('div');
                div.className = `item-linha ${item.comprado ? 'comprado' : ''}`;
                div.innerHTML = `
                    <div class="texto-item">
                        <strong>${item.qtd}x ${item.desc}</strong><br>
                        <small>R$ ${subtotal.toFixed(2)}</small>
                    </div>
                    <div class="botoes-item">
                        <button class="btn-acao" onclick="toggleItem('${key}', ${item.comprado})" style="color: green">✓</button>
                        <button class="btn-acao" onclick="removerItem('${key}')" style="color: red">X</button>
                    </div>
                `;
                listaDiv.appendChild(div);
            });
            document.getElementById('valor-total-geral').innerText = "R$ " + totalGeral.toFixed(2).replace('.', ',');
        });

        // Funções globais para os botões
        window.toggleItem = (key, statusAtual) => {
            update(ref(db, 'compras/' + key), { comprado: !statusAtual });
        };

        window.removerItem = (key) => {
            if(confirm("Deseja apagar este item?")) {
                remove(ref(db, 'compras/' + key));
            }
        };

    </script>
</body>
</html>
