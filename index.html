<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Compras Mobile</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            background-color: #f4f4f4; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px;
            margin: 0;
        }
        
        /* Barra de Adicionar - Estilo Mobile */
        .controles { 
            background: #fff; 
            width: 100%;
            max-width: 500px;
            padding: 15px; 
            border: 1px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 10px; 
            display: flex; 
            flex-direction: column;
            gap: 10px;
            border-bottom: 4px dashed #ccc;
        }

        .input-group { display: flex; gap: 8px; }

        input, select { 
            background: #fff;
            border: 1px solid #000;
            padding: 12px; /* Maior para o dedo */
            font-size: 16px; /* Evita zoom automático no iOS */
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        .btn-add { 
            background: #000; 
            color: #fff; 
            border: none; 
            padding: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
        }

        /* Estilo da Nota */
        .recibo { 
            background-color: #fff; 
            width: 100%;
            max-width: 500px;
            padding: 20px; 
            border: 1px solid #ccc; 
            min-height: 300px;
        }

        .header { 
            text-align: center; 
            border-bottom: 2px dashed #000; 
            padding-bottom: 10px; 
            margin-bottom: 15px; 
        }
        
        .categoria-header { 
            background: #333; 
            color: #fff;
            padding: 5px 10px; 
            font-weight: bold; 
            font-size: 0.8rem; 
            margin-top: 15px; 
            text-transform: uppercase; 
        }
        
        .tabela-itens { width: 100%; border-collapse: collapse; }
        
        .item-linha { 
            border-bottom: 1px solid #eee; 
            touch-action: none; /* Necessário para drag and drop em mobile */
        }
        
        .item-linha.comprado { color: #aaa; }
        .item-linha.comprado .desc-celula { text-decoration: line-through; }
        
        /* Botões de Ação Mobile */
        .acoes-print { 
            display: flex; 
            gap: 5px; 
            padding: 10px 0;
            justify-content: center;
        }

        .btn-acao { 
            min-width: 40px; 
            min-height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 1px solid #eee;
            border-radius: 4px;
            background: #f9f9f9;
            font-size: 1.2rem;
        }

        .totais { 
            margin-top: 20px; 
            border-top: 2px dashed #000; 
            padding-top: 15px; 
            font-weight: bold; 
            font-size: 1.2rem; 
            display: flex; 
            justify-content: space-between; 
        }

        /* Botões Fixos de Rodapé no Celular */
        .botoes-fixos {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }

        .btn-finalizar { background: #fff; color: #000; border: 2px solid #000; padding: 15px; font-weight: bold; }
        .btn-imprimir { background: #000; color: #fff; border: none; padding: 15px; font-weight: bold; }

        @media print {
            .controles, .botoes-fixos, .acoes-print { display: none !important; }
            .recibo { width: 100%; box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <div class="controles">
        <div class="input-group">
            <input type="number" id="qtd" style="width: 30%" value="1" inputmode="numeric">
            <input type="text" id="desc" style="width: 70%" placeholder="ITEM/PRODUTO">
        </div>
        <div class="input-group">
            <input type="number" id="valor" style="width: 40%" placeholder="R$ UN." step="0.01" inputmode="decimal">
            <select id="categoria" style="width: 60%">
                <option value="GERAL">CATEGORIA</option>
                <option value="LIMPEZA">LIMPEZA</option>
                <option value="AÇOUGUE">AÇOUGUE</option>
                <option value="HORTIFRUTI">HORTIFRUTI</option>
                <option value="PADARIA">PADARIA</option>
                <option value="BEBIDAS">BEBIDAS</option>
            </select>
        </div>
        <button class="btn-add" onclick="adicionarItem()">+ ADICIONAR NA LISTA</button>
    </div>

    <div class="recibo">
        <div class="header">
            <h2 style="margin: 0;">COMPRA DO MÊS</h2>
            <small id="data-atual"></small>
        </div>

        <div id="lista-agrupada"></div>

        <div class="totais">
            <span>TOTAL:</span>
            <span id="valor-total-geral">R$ 0,00</span>
        </div>
    </div>

    <div class="botoes-fixos">
        <button class="btn-finalizar" onclick="finalizarCompra()">FECHAR MÊS / ARQUIVAR</button>
        <button class="btn-imprimir" onclick="window.print()">IMPRIMIR CUPOM</button>
    </div>

    <script>
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');

        let bancoDados = JSON.parse(localStorage.getItem('compra_ativa_db')) || [];

        function adicionarItem() {
            const q = document.getElementById('qtd');
            const d = document.getElementById('desc');
            const v = document.getElementById('valor');
            const c = document.getElementById('categoria');

            if (!d.value.trim() || isNaN(v.value)) return alert("Preencha descrição e valor!");

            const novoItem = { 
                id: "item_" + Date.now(), 
                qtd: parseFloat(q.value), 
                desc: d.value.toUpperCase(), 
                valorUn: parseFloat(v.value),
                cat: c.value,
                comprado: false
            };
            
            bancoDados.push(novoItem);
            salvarERenderizar();
            d.value = ""; v.value = ""; q.value = "1";
            d.focus();
        }

        function salvarERenderizar() {
            localStorage.setItem('compra_ativa_db', JSON.stringify(bancoDados));
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('lista-agrupada');
            container.innerHTML = "";
            let totalGeral = 0;
            const categoriasUsadas = [...new Set(bancoDados.map(i => i.cat))];
            
            categoriasUsadas.forEach(cat => {
                const sessao = document.createElement('div');
                sessao.innerHTML = `<div class="categoria-header">${cat}</div>`;
                const tabela = document.createElement('table');
                tabela.className = "tabela-itens";
                
                bancoDados.filter(i => i.cat === cat).forEach(item => {
                    const subtotal = item.qtd * item.valorUn;
                    totalGeral += subtotal;
                    const tr = document.createElement('tr');
                    tr.className = `item-linha ${item.comprado ? 'comprado' : ''}`;
                    
                    tr.innerHTML = `
                        <td class="desc-celula" style="padding: 10px 0;">
                            <strong>${item.qtd}x</strong> ${item.desc}<br>
                            <small>R$ ${item.valorUn.toFixed(2)} | Sub: R$ ${subtotal.toFixed(2)}</small>
                        </td>
                        <td class="acoes-print">
                            <button class="btn-acao" onclick="toggleCheck('${item.id}')" style="color:green">✓</button>
                            <button class="btn-acao" onclick="remover('${item.id}')" style="color:red">×</button>
                        </td>
                    `;
                    tabela.appendChild(tr);
                });
                sessao.appendChild(tabela);
                container.appendChild(sessao);
            });
            document.getElementById('valor-total-geral').innerText = "R$ " + totalGeral.toFixed(2).replace('.', ',');
        }

        function toggleCheck(id) {
            const item = bancoDados.find(i => i.id === id);
            if (item) item.comprado = !item.comprado;
            salvarERenderizar();
        }

        function remover(id) {
            if(confirm("Remover item?")) {
                bancoDados = bancoDados.filter(i => i.id !== id);
                salvarERenderizar();
            }
        }

        function finalizarCompra() {
            if (confirm("Arquivar lista e limpar para o próximo mês?")) {
                bancoDados = [];
                salvarERenderizar();
                alert("Mês finalizado com sucesso!");
            }
        }

        renderizar();
    </script>
</body>
</html>
